<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-graduation-cap"></i>
            <h1>Smart Attendance System</h1>
            <p>Secure role-based attendance management</p>
        </div>
        
        <div class="role-selector">
            <h2>Select Your Role</h2>
            <div class="role-buttons">
                <button class="role-btn" data-role="student">
                    <i class="fas fa-user-graduate"></i>
                    <span>Student</span>
                </button>
                <button class="role-btn" data-role="teacher">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Teacher</span>
                </button>
                <button class="role-btn" data-role="hod">
                    <i class="fas fa-user-tie"></i>
                    <span>HOD</span>
                </button>
                <button class="role-btn" data-role="principal">
                    <i class="fas fa-crown"></i>
                    <span>Principal</span>
                </button>
            </div>
        </div>

        <div class="login-form-container" id="loginFormContainer" style="display: none;">
            <form id="loginForm" class="login-form">
                <div class="form-header">
                    <i id="roleIcon" class="fas fa-user"></i>
                    <h3 id="roleTitle">Login</h3>
                </div>
                
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Username" required>
                </div>
                
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>
                
                <div class="demo-credentials">
                    <h4>Demo Credentials:</h4>
                    <div class="credential-grid">
                        <div class="credential-item">
                            <strong>Student:</strong> student1 / password123
                        </div>
                        <div class="credential-item">
                            <strong>Teacher:</strong> teacher1 / password123
                        </div>
                        <div class="credential-item">
                            <strong>HOD:</strong> hod1 / password123
                        </div>
                        <div class="credential-item">
                            <strong>Principal:</strong> principal1 / password123
                        </div>
                    </div>
                </div>
                
                <button type="button" class="back-btn" onclick="showRoleSelector()">
                    <i class="fas fa-arrow-left"></i>
                    Back to Role Selection
                </button>
            </form>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="loadingSpinner" class="loading-spinner" style="display: none;">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Logging in...</span>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
